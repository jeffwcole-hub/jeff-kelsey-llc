<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="K&J LLC">
<meta name="application-name" content="K&J LLC">
<meta name="theme-color" content="#150d2e">
<meta name="description" content="A sparkly little converter for Jeff and Kelsey time.">
<title>How Long Are We Apart?</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Outfit:wght@300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0d0820;
    --bg-1: #1c1140;
    --bg-2: #2a1554;
    --glass: rgba(255, 255, 255, 0.07);
    --glass-edge: rgba(255, 255, 255, 0.16);
    --ink: #f4efff;
    --ink-dim: rgba(244, 239, 255, 0.55);
    --gold: #ffd98e;
    --rose: #ff9ecb;
    --aqua: #8ee3ff;
    --violet: #c5a3ff;
    --radius: 26px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    color: var(--ink);
    background: radial-gradient(120% 90% at 20% 0%, var(--bg-2) 0%, var(--bg-1) 45%, var(--bg-0) 100%) fixed;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  input { -webkit-user-select: text; user-select: text; }

  #sparkle { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: max(20px, env(safe-area-inset-top)) 18px calc(48px + env(safe-area-inset-bottom));
  }

  /* ── header ─────────────────────────────── */
  header { text-align: center; padding: 30px 0 28px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: clamp(30px, 8.5vw, 42px);
    font-variation-settings: 'opsz' 100;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  h1 .accent { font-style: italic; color: var(--gold); }

  /* ── cards ──────────────────────────────── */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    border-radius: var(--radius);
    padding: 22px 20px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    margin-bottom: 16px;
  }

  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 12px;
  }

  #amount {
    width: 100%;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 36px;
    text-align: center;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--glass-edge);
    border-radius: 18px;
    padding: 12px 16px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    margin-bottom: 14px;
    transition: border-color 0.25s ease;
  }
  #amount:focus { border-color: var(--gold); }
  #amount::placeholder { color: rgba(244, 239, 255, 0.25); }
  #amount::-webkit-outer-spin-button, #amount::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* ── unit chips ─────────────────────────── */
  .chips { display: grid; gap: 8px; }
  .chips.in-units  { grid-template-columns: repeat(4, 1fr); }
  .chips.out-units { grid-template-columns: repeat(3, 1fr); }

  .chip {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.03em;
    color: var(--ink-dim);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    padding: 11px 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chip:active { transform: scale(0.95); }
  .chip.sel {
    color: var(--bg-0);
    font-weight: 700;
    background: linear-gradient(135deg, #ffe9bd, var(--gold));
    border-color: transparent;
    box-shadow: 0 4px 18px -6px rgba(255, 217, 142, 0.6);
  }

  /* ── output ─────────────────────────────── */
  .output-card { text-align: center; padding: 30px 20px 24px; }

  .result {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: clamp(42px, 14vw, 64px);
    line-height: 1.05;
    background: linear-gradient(180deg, #fff 0%, #ffe9b8 55%, #ffcf7a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter: drop-shadow(0 2px 14px rgba(255, 200, 110, 0.35));
    animation: pop 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.4);
  }
  @keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .result.placeholder {
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 16px;
    background: none;
    -webkit-text-fill-color: currentColor;
    color: rgba(244, 239, 255, 0.35);
    filter: none;
    letter-spacing: 0.02em;
    padding: 18px 0;
  }

  .out-chips-wrap { margin-top: 18px; }

  .mood {
    text-align: center;
    font-size: 46px;
    line-height: 1;
    min-height: 54px;
    margin-top: 4px;
    animation: pop 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.4);
  }

  footer {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(244, 239, 255, 0.3);
    margin-top: 26px;
  }

  /* ── drawer / hamburger ─────────────────── */
  .burger {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    left: 14px;
    z-index: 50;
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4.5px;
  }
  .burger span {
    display: block;
    width: 18px; height: 2px;
    border-radius: 2px;
    background: var(--ink);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .burger.open span:nth-child(2) { opacity: 0; }
  .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  .drawer-veil {
    position: fixed; inset: 0;
    z-index: 45;
    background: rgba(10, 6, 26, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .drawer-veil.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: min(300px, 82vw);
    padding: calc(76px + env(safe-area-inset-top)) 20px 24px;
    background: linear-gradient(160deg, rgba(58, 36, 104, 0.95), rgba(24, 14, 52, 0.97));
    border-right: 1px solid var(--glass-edge);
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0.28, 1);
    display: flex;
    flex-direction: column;
  }
  .drawer-veil.open .drawer { transform: none; }

  .drawer-brand { margin-bottom: 28px; }
  .drawer-brand .est {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .drawer-brand .name {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: 24px;
  }
  .drawer-brand .name i { color: var(--gold); }

  .drawer-eyebrow {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }

  .drawer-link {
    display: block;
    text-decoration: none;
    color: var(--ink);
    background: var(--glass);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s ease;
  }
  .drawer-link .app-name {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: 17px;
  }
  .drawer-link .dept {
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 3px;
  }
  .drawer-link.current { border-color: rgba(255, 217, 142, 0.5); }
  .drawer-link.current .dept { color: var(--gold); }

  .drawer-foot {
    margin-top: auto;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(244, 239, 255, 0.3);
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<canvas id="sparkle"></canvas>

<button class="burger" id="burger" aria-label="Open menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>

<div class="drawer-veil" id="drawer-veil">
  <nav class="drawer" aria-label="Kelsey & Jeff LLC">
    <div class="drawer-brand">
      <div class="est">Est. 2026</div>
      <div class="name">Kelsey &amp; Jeff <i>LLC</i></div>
    </div>
    <div class="drawer-eyebrow">Divisions</div>
    <a class="drawer-link current" href="/">
      <div class="app-name">How Long Are We Apart?</div>
      <div class="dept">Department of Distance</div>
    </a>
    <a class="drawer-link" href="/points/">
      <div class="app-name">Ten Points</div>
      <div class="dept">Department of the Treasury</div>
    </a>
    <div class="drawer-foot">A very serious company</div>
  </nav>
</div>

<div class="app">
  <header>
    <h1>How long are we <span class="accent">apart?</span></h1>
  </header>

  <section class="card">
    <label class="field-label" for="amount">Real-world time</label>
    <input id="amount" type="text" inputmode="decimal" placeholder="0">
    <div class="chips in-units" id="in-units" role="group" aria-label="Input unit">
      <button class="chip" data-mins="1">minutes</button>
      <button class="chip sel" data-mins="60">hours</button>
      <button class="chip" data-mins="1440">days</button>
      <button class="chip" data-mins="10080">weeks</button>
    </div>
  </section>

  <section class="card output-card">
    <label class="field-label">Jeff &amp; Kelsey time</label>
    <div class="result placeholder" id="result" aria-live="polite">enter a number</div>
    <div class="out-chips-wrap">
      <div class="chips out-units" id="out-units" role="group" aria-label="Output unit">
        <button class="chip" data-unit="hours">hours</button>
        <button class="chip" data-unit="days">days</button>
        <button class="chip" data-unit="weeks">weeks</button>
        <button class="chip" data-unit="fortnights">fortnights</button>
        <button class="chip" data-unit="months">months</button>
        <button class="chip" data-unit="years">years</button>
      </div>
    </div>
  </section>

  <div class="mood" id="mood" role="img" aria-label="mood"></div>

  <footer>Exchange rate fixed at 1:50 · non-negotiable</footer>
</div>

<script>
/* ═════════ DRAWER ═════════ */
const burger = document.getElementById('burger');
const drawerVeil = document.getElementById('drawer-veil');
function toggleDrawer() {
  const open = drawerVeil.classList.toggle('open');
  burger.classList.toggle('open', open);
  burger.setAttribute('aria-expanded', open);
}
burger.addEventListener('click', toggleDrawer);
drawerVeil.addEventListener('click', e => { if (e.target === drawerVeil) toggleDrawer(); });

/* ═════════ SPARKLE ENGINE (sprite-cached) ═════════ */
(function () {
  const canvas = document.getElementById('sparkle');
  const ctx = canvas.getContext('2d');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let w, h, bokeh, flecks, dust;
  const DPR = Math.min(devicePixelRatio || 1, 2);

  const COLORS = [
    '255,215,120', '255,120,150', '120,200,255',
    '180,140,255', '120,255,190', '255,170,90', '255,240,150'
  ];
  const pick = a => a[(Math.random() * a.length) | 0];

  /* pre-render one glow sprite per color: bright core + soft falloff.
     Stamping these with drawImage is ~10x cheaper than building
     radial gradients per particle per frame. */
  const SPRITE = 64, HALF = SPRITE / 2;
  const sprites = {};
  for (const c of COLORS) {
    const off = document.createElement('canvas');
    off.width = off.height = SPRITE;
    const g = off.getContext('2d');
    const grad = g.createRadialGradient(HALF, HALF, 0, HALF, HALF, HALF);
    grad.addColorStop(0,    `rgba(${c},1)`);
    grad.addColorStop(0.12, `rgba(${c},0.85)`);
    grad.addColorStop(0.35, `rgba(${c},0.30)`);
    grad.addColorStop(1,    `rgba(${c},0)`);
    g.fillStyle = grad;
    g.fillRect(0, 0, SPRITE, SPRITE);
    sprites[c] = off;
  }

  function stamp(x, y, r, color, a) {
    ctx.globalAlpha = a;
    const s = r * 6; // sprite spans core + glow
    ctx.drawImage(sprites[color], x - s / 2, y - s / 2, s, s);
  }

  function resize() {
    w = innerWidth; h = innerHeight;
    canvas.width = w * DPR; canvas.height = h * DPR;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    build();
  }

  function build() {
    bokeh = Array.from({ length: Math.round((w * h) / 26000) }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 5 + 2.5,
      color: pick(COLORS),
      base: Math.random() * 0.14 + 0.04,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.015 + 0.004,
      drift: (Math.random() - 0.5) * 0.12,
      rise: Math.random() * 0.25 + 0.05
    }));
    flecks = Array.from({ length: Math.round((w * h) / 6500) }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.3 + 0.4,
      color: pick(COLORS),
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.05 + 0.015,
      drift: (Math.random() - 0.5) * 0.2,
      vy: -(Math.random() * 0.35 + 0.08)
    }));
    dust = Array.from({ length: Math.round((w * h) / 4800) }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.1 + 0.35,
      color: pick(COLORS),
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.08 + 0.02,
      drift: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.3
    }));
  }

  function frame(animate) {
    ctx.clearRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'lighter';

    for (const b of bokeh) {
      if (animate) {
        b.phase += b.speed; b.x += b.drift; b.y -= b.rise;
        if (b.y < -b.r * 6) { b.y = h + b.r * 6; b.x = Math.random() * w; }
        if (b.x < -b.r * 6) b.x = w + b.r * 6;
        if (b.x > w + b.r * 6) b.x = -b.r * 6;
      }
      stamp(b.x, b.y, b.r, b.color, b.base + ((Math.sin(b.phase) + 1) / 2) * 0.12);
    }
    for (const f of flecks) {
      if (animate) {
        f.phase += f.speed; f.x += f.drift; f.y += f.vy;
        if (f.y < -6) { f.y = h + 6; f.x = Math.random() * w; }
        if (f.x < -6) f.x = w + 6;
        if (f.x > w + 6) f.x = -6;
      }
      stamp(f.x, f.y, f.r, f.color, 0.15 + ((Math.sin(f.phase) + 1) / 2) * 0.75);
    }
    for (const d of dust) {
      if (animate) {
        d.phase += d.speed; d.x += d.drift; d.y += d.vy;
        if (d.y < -6) d.y = h + 6;
        if (d.y > h + 6) d.y = -6;
        if (d.x < -6) d.x = w + 6;
        if (d.x > w + 6) d.x = -6;
      }
      stamp(d.x, d.y, d.r, d.color, 0.15 + ((Math.sin(d.phase) + 1) / 2) * 0.6);
    }

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    if (animate) requestAnimationFrame(() => frame(true));
  }

  addEventListener('resize', resize);
  resize();
  frame(!reduced); // reduced motion: one static, pretty frame
})();

/* ═════════ CONVERTER ═════════ */
const MULTIPLIER = 50;
const OUTPUT_UNITS = {
  hours: 60, days: 1440, weeks: 10080,
  fortnights: 20160, months: 43200, years: 525600
};
const SINGULAR = {
  hours: 'hour', days: 'day', weeks: 'week',
  fortnights: 'fortnight', months: 'month', years: 'year'
};

const amountEl = document.getElementById('amount');
const resultEl = document.getElementById('result');
const moodEl = document.getElementById('mood');
const inChips = [...document.querySelectorAll('#in-units .chip')];
const outChips = [...document.querySelectorAll('#out-units .chip')];

let inputMins = 60;          // default: hours
let userPickedOutput = false;
let outputUnit = 'days';

inChips.forEach(c => c.addEventListener('click', () => {
  inputMins = +c.dataset.mins;
  inChips.forEach(x => x.classList.toggle('sel', x === c));
  userPickedOutput = false;
  render();
}));
outChips.forEach(c => c.addEventListener('click', () => {
  outputUnit = c.dataset.unit;
  userPickedOutput = true;
  render();
}));
amountEl.addEventListener('input', () => {
  amountEl.value = amountEl.value.replace(/[^0-9.]/g, '');
  userPickedOutput = false;
  render();
});

function pickBestUnit(totalMinutes) {
  for (const u of ['years', 'months', 'fortnights', 'weeks', 'days', 'hours']) {
    if (totalMinutes / OUTPUT_UNITS[u] >= 1) return u;
  }
  return 'hours';
}

/* honest numbers: one decimal below 10, clean integers above */
function fmt(n) {
  if (n < 10) {
    const r = Math.round(n * 10) / 10;
    return r % 1 === 0 ? String(r) : r.toFixed(1);
  }
  return Math.round(n).toLocaleString();
}

function label(unit, formatted) {
  return formatted === '1' ? SINGULAR[unit] : unit;
}

function render() {
  const raw = parseFloat(amountEl.value);
  if (isNaN(raw) || raw <= 0) {
    resultEl.className = 'result placeholder';
    resultEl.textContent = 'enter a number';
    moodEl.textContent = '';
    outChips.forEach(x => x.classList.remove('sel'));
    return;
  }

  /* Kelsey's mood index — based on REAL time apart.
     Tier 1 is U+1FAEA DISTORTED FACE (Unicode 17.0, iOS 26.4+). */
  const realDays = (raw * inputMins) / 1440;
  const mood = realDays < 3 ? '\u{1FAEA}' : realDays <= 7 ? '\u{1F974}' : '\u{1F622}';
  if (moodEl.textContent !== mood) {
    moodEl.textContent = mood;
    moodEl.style.animation = 'none';
    void moodEl.offsetWidth;
    moodEl.style.animation = '';
  }

  const totalMinutes = raw * inputMins * MULTIPLIER;
  if (!userPickedOutput) outputUnit = pickBestUnit(totalMinutes);
  outChips.forEach(x => x.classList.toggle('sel', x.dataset.unit === outputUnit));

  const value = totalMinutes / OUTPUT_UNITS[outputUnit];
  const out = fmt(value);
  const text = out + ' ' + label(outputUnit, out);

  resultEl.className = 'result';
  if (resultEl.textContent !== text) {
    resultEl.textContent = text;
    resultEl.style.animation = 'none';
    void resultEl.offsetWidth;
    resultEl.style.animation = '';
  }

}

render();

/* ═════════ PWA ═════════ */
if ('serviceWorker' in navigator) {
  addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
