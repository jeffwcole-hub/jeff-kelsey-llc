<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#150d2e">
<title>Ten Points</title>
<!--
  ═══════════════════════════════════════════════════════════
  TEN POINTS — a very serious economy for two people
  Netlify edition: Functions + Blobs, no Firebase.
  See README.md for the 3-step deploy.
  Opened directly as a file (or if the API is unreachable),
  the app runs in LOCAL DEMO MODE via localStorage.
  ═══════════════════════════════════════════════════════════
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Outfit:wght@300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0d0820;
    --bg-1: #1c1140;
    --bg-2: #2a1554;
    --glass: rgba(255, 255, 255, 0.07);
    --glass-edge: rgba(255, 255, 255, 0.16);
    --ink: #f4efff;
    --ink-dim: rgba(244, 239, 255, 0.55);
    --gold: #ffd98e;
    --rose: #ff9ecb;
    --aqua: #8ee3ff;
    --coral: #ff8e8e;
    --violet: #c5a3ff;
    --radius: 26px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    color: var(--ink);
    background: radial-gradient(120% 90% at 20% 0%, var(--bg-2) 0%, var(--bg-1) 45%, var(--bg-0) 100%) fixed;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  body.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: none; }
    20% { transform: translate(-6px, 2px) rotate(-0.4deg); }
    40% { transform: translate(5px, -3px) rotate(0.3deg); }
    60% { transform: translate(-4px, 3px); }
    80% { transform: translate(3px, -2px); }
  }

  #glitter { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: max(20px, env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));
  }

  /* ── header ─────────────────────────────── */
  header { text-align: center; padding: 18px 0 26px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: clamp(34px, 9vw, 46px);
    font-variation-settings: 'opsz' 100;
    letter-spacing: -0.01em;
  }
  h1 .pts { font-style: italic; color: var(--gold); }

  .demo-pill {
    display: none;
    margin: 12px auto 0;
    width: fit-content;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(255, 217, 142, 0.35);
    border-radius: 99px;
    padding: 5px 14px;
    background: rgba(255, 217, 142, 0.08);
  }
  body.demo .demo-pill { display: block; }

  /* ── drawer / hamburger ─────────────────── */
  .burger {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    left: 14px;
    z-index: 50;
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4.5px;
  }
  .burger span {
    display: block;
    width: 18px; height: 2px;
    border-radius: 2px;
    background: var(--ink);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .burger.open span:nth-child(2) { opacity: 0; }
  .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  .drawer-veil {
    position: fixed; inset: 0;
    z-index: 45;
    background: rgba(10, 6, 26, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .drawer-veil.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: min(300px, 82vw);
    padding: calc(76px + env(safe-area-inset-top)) 20px 24px;
    background: linear-gradient(160deg, rgba(58, 36, 104, 0.95), rgba(24, 14, 52, 0.97));
    border-right: 1px solid var(--glass-edge);
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0.28, 1);
    display: flex;
    flex-direction: column;
  }
  .drawer-veil.open .drawer { transform: none; }

  .drawer-brand { margin-bottom: 28px; }
  .drawer-brand .est {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .drawer-brand .name {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: 24px;
  }
  .drawer-brand .name i { color: var(--gold); }

  .drawer-eyebrow {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }

  .drawer-link {
    display: block;
    text-decoration: none;
    color: var(--ink);
    background: var(--glass);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s ease;
  }
  .drawer-link .app-name {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: 17px;
  }
  .drawer-link .dept {
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 3px;
  }
  .drawer-link.current { border-color: rgba(255, 217, 142, 0.5); }
  .drawer-link.current .dept { color: var(--gold); }

  .drawer-foot {
    margin-top: auto;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(244, 239, 255, 0.3);
    text-align: center;
  }

  /* ── score cards ────────────────────────── */
  .scores { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .card {
    position: relative;
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    border-radius: var(--radius);
    padding: 24px 16px 20px;
    text-align: center;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
    transition: box-shadow 0.5s ease;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(80% 60% at 50% 0%, var(--tint), transparent 70%);
    opacity: 0.22;
    pointer-events: none;
  }
  .card.kelsey { --tint: var(--rose); }
  .card.jeff   { --tint: var(--aqua); }
  .card.me { box-shadow: 0 0 0 1.5px var(--tint), 0 8px 40px -12px var(--tint); }

  .card .who {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--tint);
    filter: brightness(1.1);
    margin-bottom: 6px;
  }
  .card .you-tag {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    display: none;
  }
  .card.me .you-tag { display: block; }

  .balance {
    font-family: 'Fraunces', serif;
    font-weight: 620;
    font-size: clamp(48px, 13vw, 68px);
    line-height: 1.05;
    font-variation-settings: 'opsz' 144;
    margin: 6px 0 2px;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .balance.bump { transform: scale(1.18); }
  .balance-label {
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* ── award actions ──────────────────────── */
  .actions { margin-top: 16px; text-align: center; }

  .btn-main {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    color: var(--bg-0);
    background: linear-gradient(135deg, #ffe9bd, var(--gold));
    border: none;
    border-radius: 20px;
    padding: 18px 10px;
    width: 100%;
    cursor: pointer;
    box-shadow: 0 6px 26px -8px rgba(255, 217, 142, 0.6);
    transition: transform 0.15s ease;
  }
  .btn-main:active { transform: scale(0.96); }

  .off-menu {
    background: none;
    border: none;
    color: var(--ink-dim);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .tier-menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 14px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.45s ease, opacity 0.3s ease;
  }
  .tier-menu.open { max-height: 320px; opacity: 1; }

  .chip {
    position: relative;
    font-family: 'Fraunces', serif;
    font-weight: 640;
    font-size: 22px;
    padding: 16px 6px 24px;
    border-radius: 18px;
    cursor: pointer;
    transition: transform 0.15s ease;
    border: 1px solid var(--glass-edge);
    background: var(--glass);
    color: var(--ink);
  }
  .chip:active { transform: scale(0.94); }
  .chip small {
    position: absolute; left: 0; right: 0; bottom: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .chip.c5    { border-color: rgba(142, 227, 255, 0.4); color: var(--aqua); }
  .chip.c25   {
    border-color: rgba(255, 217, 142, 0.55); color: var(--gold);
    box-shadow: inset 0 0 22px -8px rgba(255, 217, 142, 0.4);
  }
  .chip.c50 {
    border-color: rgba(197, 163, 255, 0.65); color: var(--violet);
    box-shadow: inset 0 0 26px -6px rgba(197, 163, 255, 0.45), 0 0 24px -8px rgba(197, 163, 255, 0.4);
    animation: fiftyPulse 2.6s ease-in-out infinite;
  }
  @keyframes fiftyPulse {
    0%,100% { box-shadow: inset 0 0 26px -6px rgba(197,163,255,0.45), 0 0 24px -8px rgba(197,163,255,0.4); }
    50%     { box-shadow: inset 0 0 30px -4px rgba(197,163,255,0.6),  0 0 34px -4px rgba(197,163,255,0.6); }
  }
  .chip.cminus {
    border-color: rgba(255, 142, 142, 0.4); color: var(--coral);
  }
  .chip.custom {
    grid-column: 1 / -1;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 15px 6px;
    border: 1.5px dashed rgba(255, 255, 255, 0.28);
    background: rgba(255, 255, 255, 0.03);
    color: var(--ink-dim);
  }
  .chip.custom:active { transform: scale(0.98); }

  .hint {
    text-align: center;
    font-size: 12.5px;
    color: var(--ink-dim);
    margin-top: 14px;
  }
  .hint b { color: var(--ink); font-weight: 600; }
  .hint button {
    background: none; border: none;
    color: var(--gold);
    font: inherit; font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── ledger ─────────────────────────────── */
  .ledger { margin-top: 30px; }
  .ledger h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 480;
    font-size: 21px;
    margin-bottom: 14px;
  }

  .entry {
    display: flex;
    gap: 14px;
    align-items: baseline;
    background: var(--glass);
    border: 1px solid rgba(255, 255, 255, 0.09);
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    animation: entryIn 0.4s ease both;
  }
  @keyframes entryIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .entry .amt {
    font-family: 'Fraunces', serif;
    font-weight: 640;
    font-size: 20px;
    min-width: 52px;
    color: var(--gold);
  }
  .entry.minus .amt { color: var(--coral); }
  .entry.big25 .amt { text-shadow: 0 0 14px rgba(255, 217, 142, 0.6); }
  .entry.big50 .amt { color: var(--violet); text-shadow: 0 0 14px rgba(197, 163, 255, 0.7); }
  .entry.minus.big25 .amt, .entry.minus.big50 .amt { color: var(--coral); text-shadow: 0 0 14px rgba(255, 142, 142, 0.6); }

  .entry .body { flex: 1; }
  .entry .line { font-size: 15px; line-height: 1.45; }
  .entry .line .name { font-weight: 700; }
  .entry .line .name.kelsey { color: var(--rose); }
  .entry .line .name.jeff   { color: var(--aqua); }
  .entry .when {
    font-size: 11.5px;
    color: var(--ink-dim);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .empty {
    text-align: center;
    color: var(--ink-dim);
    font-size: 14.5px;
    padding: 34px 20px;
    border: 1.5px dashed rgba(255, 255, 255, 0.15);
    border-radius: var(--radius);
    line-height: 1.6;
  }

  /* ── modals ─────────────────────────────── */
  .veil {
    position: fixed; inset: 0;
    background: rgba(10, 6, 26, 0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 20;
  }
  .veil.open { display: flex; }

  .sheet {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(160deg, rgba(58, 36, 104, 0.92), rgba(24, 14, 52, 0.94));
    border: 1px solid var(--glass-edge);
    border-radius: 28px;
    padding: 30px 26px;
    text-align: center;
    animation: sheetIn 0.35s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }
  @keyframes sheetIn {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: none; }
  }

  .sheet h3 {
    font-family: 'Fraunces', serif;
    font-weight: 560;
    font-size: 25px;
    margin-bottom: 6px;
  }
  .sheet h3.penalty { color: var(--coral); }
  .sheet p { font-size: 14px; color: var(--ink-dim); margin-bottom: 20px; line-height: 1.5; }

  .id-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .id-btn {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 17px;
    padding: 20px 10px;
    border-radius: 20px;
    border: 1px solid var(--glass-edge);
    background: var(--glass);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .id-btn:active { transform: scale(0.96); }
  .id-btn.k { box-shadow: inset 0 0 0 1.5px rgba(255, 158, 203, 0.5); }
  .id-btn.j { box-shadow: inset 0 0 0 1.5px rgba(142, 227, 255, 0.5); }

  .sign-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .sign {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.03em;
    padding: 12px 6px;
    border-radius: 14px;
    cursor: pointer;
    color: var(--ink-dim);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    transition: all 0.2s ease;
  }
  .sign:active { transform: scale(0.96); }
  .sign.sel[data-sign="1"] {
    color: var(--bg-0);
    background: linear-gradient(135deg, #ffe9bd, var(--gold));
    border-color: transparent;
  }
  .sign.sel[data-sign="-1"] {
    color: var(--ink);
    background: rgba(255, 142, 142, 0.16);
    border-color: rgba(255, 142, 142, 0.55);
  }

  .amt-input {
    width: 100%;
    font-family: 'Fraunces', serif;
    font-weight: 640;
    font-size: 44px;
    text-align: center;
    color: var(--gold);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--glass-edge);
    border-radius: 18px;
    padding: 12px 16px;
    outline: none;
    margin-bottom: 8px;
  }
  .amt-input:focus { border-color: var(--gold); }
  .amt-input::placeholder { color: rgba(244, 239, 255, 0.25); }
  .amt-preview {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    min-height: 16px;
    margin-bottom: 14px;
  }

  .sheet textarea {
    width: 100%;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--glass-edge);
    border-radius: 16px;
    padding: 14px 16px;
    resize: none;
    height: 88px;
    outline: none;
    margin-bottom: 16px;
  }
  .sheet textarea:focus { border-color: var(--gold); }
  .sheet textarea::placeholder { color: rgba(244, 239, 255, 0.35); }

  .sheet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ghost {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-dim);
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 18px;
    padding: 15px;
    cursor: pointer;
  }
  .confirm {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--bg-0);
    background: linear-gradient(135deg, #ffe9bd, var(--gold));
    border: none;
    border-radius: 18px;
    padding: 15px;
    cursor: pointer;
  }
  .confirm:disabled { opacity: 0.5; }

  /* ── ceremony ───────────────────────────── */
  .ceremony {
    position: fixed; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    z-index: 30;
    pointer-events: none;
  }
  .ceremony.on { display: flex; }
  .ceremony .big {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-style: italic;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(255, 217, 142, 0.65);
    animation: pop 1.5s cubic-bezier(0.22, 1.3, 0.36, 1) both;
  }
  .ceremony .tag {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
    animation: pop 1.5s ease both;
  }
  .ceremony.t1 .big { font-size: clamp(80px, 24vw, 150px); }
  .ceremony.t2 .big { font-size: clamp(110px, 32vw, 200px); }
  .ceremony.t3 .big {
    font-size: clamp(140px, 42vw, 260px);
    color: var(--violet);
    text-shadow: 0 0 90px rgba(197, 163, 255, 0.9);
    animation: popSlow 2.6s cubic-bezier(0.22, 1.3, 0.36, 1) both;
  }
  .ceremony.neg .big {
    color: var(--coral) !important;
    text-shadow: 0 0 70px rgba(255, 142, 142, 0.7) !important;
  }
  @keyframes pop {
    0%   { opacity: 0; transform: scale(0.3) rotate(-6deg); }
    18%  { opacity: 1; transform: scale(1.08) rotate(2deg); }
    30%  { transform: scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1.05) translateY(-30px); }
  }
  @keyframes popSlow {
    0%   { opacity: 0; transform: scale(0.2) rotate(-8deg); }
    12%  { opacity: 1; transform: scale(1.15) rotate(2deg); }
    22%  { transform: scale(0.98); }
    30%  { transform: scale(1.02); }
    85%  { opacity: 1; transform: scale(1.04); }
    100% { opacity: 0; transform: scale(1.1) translateY(-40px); }
  }
  .flash {
    position: fixed; inset: 0; z-index: 25; pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(197, 163, 255, 0.35), transparent 60%);
    opacity: 0;
  }
  .flash.on { animation: flashIn 0.9s ease both; }
  @keyframes flashIn { 0% { opacity: 0; } 15% { opacity: 1; } 100% { opacity: 0; } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    #glitter { display: none; }
  }

  @media (max-width: 380px) {
    .scores, .id-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<canvas id="glitter"></canvas>
<div class="flash" id="flash"></div>

<button class="burger" id="burger" aria-label="Open menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>

<div class="drawer-veil" id="drawer-veil">
  <nav class="drawer" aria-label="Kelsey & Jeff LLC">
    <div class="drawer-brand">
      <div class="est">Est. 2026</div>
      <div class="name">Kelsey &amp; Jeff <i>LLC</i></div>
    </div>
    <div class="drawer-eyebrow">Divisions</div>
    <a class="drawer-link" href="/">
      <div class="app-name">How Long Are We Apart?</div>
      <div class="dept">Department of Distance</div>
    </a>
    <a class="drawer-link current" href="/points/">
      <div class="app-name">Ten Points</div>
      <div class="dept">Department of the Treasury</div>
    </a>
    <div class="drawer-foot">A very serious company</div>
  </nav>
</div>

<div class="app">
  <header>
    <div class="eyebrow">The Official Ledger</div>
    <h1>Ten <span class="pts">Points</span></h1>
    <div class="demo-pill">Local demo mode — deploy to Netlify to sync</div>
  </header>

  <section class="scores">
    <div class="card kelsey" id="card-kelsey">
      <div class="who">Kelsey</div>
      <div class="balance" id="bal-kelsey">0</div>
      <div class="balance-label">points</div>
      <div class="you-tag">that's you</div>
    </div>
    <div class="card jeff" id="card-jeff">
      <div class="who">Jeff</div>
      <div class="balance" id="bal-jeff">0</div>
      <div class="balance-label">points</div>
      <div class="you-tag">that's you</div>
    </div>
  </section>

  <section class="actions">
    <button class="btn-main" id="btn-10">+10 to <span class="target-name">…</span></button>
    <button class="off-menu" id="tier-toggle">going off-menu?</button>
    <div class="tier-menu" id="tier-menu">
      <button class="chip c5"     data-amt="5">+5<small>petty</small></button>
      <button class="chip cminus" data-amt="-10">−10<small>penalty</small></button>
      <button class="chip c25"    data-amt="25">+25<small>big deal</small></button>
      <button class="chip c50"    data-amt="50">+50<small>legendary</small></button>
      <button class="chip custom" id="chip-custom">name your price…</button>
    </div>
    <div class="hint">
      You are <b id="hint-me">…</b> — points may only be bestowed upon the other party.
      <button id="switch-id">switch</button>
    </div>
  </section>

  <section class="ledger">
    <h2>For the record</h2>
    <div id="entries"></div>
    <div class="empty" id="empty">
      Nothing on the books yet.<br>
      Someone is surely about to do something<br>worth exactly ten points.
    </div>
  </section>
</div>

<!-- identity chooser -->
<div class="veil" id="veil-id">
  <div class="sheet">
    <h3>Who are you?</h3>
    <p>This device will remember. Choose wisely — impersonation is a −10 offense.</p>
    <div class="id-row">
      <button class="id-btn k" data-id="kelsey">Kelsey</button>
      <button class="id-btn j" data-id="jeff">Jeff</button>
    </div>
  </div>
</div>

<!-- reason sheet (preset amounts) -->
<div class="veil" id="veil-reason">
  <div class="sheet">
    <h3 id="reason-title">+10 to Kelsey</h3>
    <p>For what? The reason is the whole point. Pun intended.</p>
    <textarea id="reason-input" maxlength="200" placeholder="e.g. correctly pointed out the Empire State building"></textarea>
    <div class="sheet-actions">
      <button class="ghost" id="reason-cancel">Never mind</button>
      <button class="confirm" id="reason-confirm">Make it official</button>
    </div>
  </div>
</div>

<!-- custom amount sheet -->
<div class="veil" id="veil-custom">
  <div class="sheet">
    <h3 id="custom-title">Name your price</h3>
    <p>Any whole number. Negatives allowed, if you must. The ceremony will match the gravity.</p>
    <div class="sign-toggle" id="sign-toggle">
      <button class="sign sel" data-sign="1">+ award</button>
      <button class="sign" data-sign="-1">− penalty</button>
    </div>
    <input class="amt-input" id="custom-amt" type="text" inputmode="numeric" placeholder="?" maxlength="3">
    <div class="amt-preview" id="custom-preview"></div>
    <textarea id="custom-reason" maxlength="200" placeholder="and the reason is…"></textarea>
    <div class="sheet-actions">
      <button class="ghost" id="custom-cancel">Never mind</button>
      <button class="confirm" id="custom-confirm">Make it official</button>
    </div>
  </div>
</div>

<!-- award ceremony -->
<div class="ceremony" id="ceremony">
  <div class="big" id="ceremony-num">+10</div>
  <div class="tag" id="ceremony-tag"></div>
</div>

<script>
/* ═════════ CONSTANTS ═════════ */
const API = '/api/points';
const PLAYERS = { kelsey: 'Kelsey', jeff: 'Jeff' };
const POLL_MS = 5000;

/* ═════════ STATE ═════════ */
let me = localStorage.getItem('tp_identity');
let entries = [];
let mode = 'net'; // 'net' | 'demo'
let pollTimer = null;

const other = id => id === 'kelsey' ? 'jeff' : 'kelsey';
const $ = s => document.querySelector(s);

/* ═════════ DATA LAYER ═════════ */
async function fetchEntries() {
  const res = await fetch(API, { cache: 'no-store' });
  if (!res.ok) throw new Error('API unavailable');
  return res.json();
}

async function initData() {
  try {
    entries = await fetchEntries();
    mode = 'net';
    startPolling();
  } catch {
    mode = 'demo';
    document.body.classList.add('demo');
    entries = JSON.parse(localStorage.getItem('tp_entries') || '[]');
  }
  render();
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (document.hidden) return;
    try {
      const fresh = await fetchEntries();
      if (JSON.stringify(fresh) !== JSON.stringify(entries)) {
        entries = fresh;
        render();
      }
    } catch { /* transient network blip — next poll will retry */ }
  }, POLL_MS);
}
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && mode === 'net') {
    fetchEntries().then(f => { entries = f; render(); }).catch(() => {});
  }
});

async function addEntry(e) {
  if (mode === 'net') {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(e)
    });
    if (!res.ok) throw new Error(await res.text());
    entries = await fetchEntries();
  } else {
    entries.unshift({ ...e, ts: Date.now() });
    localStorage.setItem('tp_entries', JSON.stringify(entries));
  }
  render();
}

/* ═════════ RENDER ═════════ */
const fmtWhen = ts => {
  const d = new Date(ts), now = new Date();
  const t = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (d.toDateString() === now.toDateString()) return `Today · ${t}`;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' · ' + t;
};

function render() {
  const totals = { kelsey: 0, jeff: 0 };
  for (const e of entries) totals[e.to] += e.amount;

  for (const id of ['kelsey', 'jeff']) {
    const el = $(`#bal-${id}`);
    if (el.textContent !== String(totals[id])) {
      el.textContent = totals[id];
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    }
    $(`#card-${id}`).classList.toggle('me', me === id);
  }

  const wrap = $('#entries');
  wrap.innerHTML = '';
  $('#empty').style.display = entries.length ? 'none' : 'block';
  for (const e of entries) {
    const mag = Math.abs(e.amount);
    const div = document.createElement('div');
    div.className = 'entry'
      + (e.amount < 0 ? ' minus' : '')
      + (mag >= 50 ? ' big50' : mag >= 25 ? ' big25' : '');
    const amt = e.amount > 0 ? `+${e.amount}` : `−${mag}`;
    div.innerHTML = `
      <div class="amt">${amt}</div>
      <div class="body">
        <div class="line"><span class="name ${e.to}">${PLAYERS[e.to]}</span> — <span class="reason"></span></div>
        <div class="when">${fmtWhen(e.ts)} · by ${PLAYERS[e.by]}</div>
      </div>`;
    div.querySelector('.reason').textContent = e.reason;
    wrap.appendChild(div);
  }

  if (me) {
    $('#hint-me').textContent = PLAYERS[me];
    document.querySelectorAll('.target-name').forEach(n => n.textContent = PLAYERS[other(me)]);
  }
}

/* ═════════ IDENTITY ═════════ */
function askIdentity() { $('#veil-id').classList.add('open'); }
document.querySelectorAll('.id-btn').forEach(b => b.addEventListener('click', () => {
  me = b.dataset.id;
  localStorage.setItem('tp_identity', me);
  $('#veil-id').classList.remove('open');
  render();
}));
$('#switch-id').addEventListener('click', askIdentity);

/* ═════════ AWARD FLOW: preset amounts ═════════ */
let pendingAmount = 10;

$('#tier-toggle').addEventListener('click', () => $('#tier-menu').classList.toggle('open'));

function openReason(amount) {
  if (!me) return askIdentity();
  pendingAmount = amount;
  const sign = amount > 0 ? '+' : '−';
  const title = $('#reason-title');
  title.textContent = `${sign}${Math.abs(amount)} ${amount > 0 ? 'to' : 'from'} ${PLAYERS[other(me)]}`;
  title.classList.toggle('penalty', amount < 0);
  $('#reason-input').value = '';
  $('#veil-reason').classList.add('open');
  setTimeout(() => $('#reason-input').focus(), 80);
}
$('#btn-10').addEventListener('click', () => openReason(10));
document.querySelectorAll('.chip[data-amt]').forEach(c =>
  c.addEventListener('click', () => openReason(+c.dataset.amt)));
$('#reason-cancel').addEventListener('click', () => $('#veil-reason').classList.remove('open'));

$('#reason-confirm').addEventListener('click', async () => {
  const reason = $('#reason-input').value.trim();
  if (!reason) { $('#reason-input').placeholder = 'A reason is required. Them\'s the rules.'; return; }
  $('#veil-reason').classList.remove('open');
  try {
    await addEntry({ to: other(me), by: me, amount: pendingAmount, reason });
    ceremony(pendingAmount);
  } catch (err) { alert(err.message || 'That didn\'t go through. Try again.'); }
});

/* ═════════ AWARD FLOW: custom amount ═════════ */
const customAmt = $('#custom-amt');
const customPreview = $('#custom-preview');
let customSign = 1;

function signedValue() {
  const digits = parseInt(customAmt.value, 10);
  return isNaN(digits) ? NaN : customSign * digits;
}
function refreshCustomPreview() {
  const n = signedValue();
  customAmt.style.color = customSign < 0 ? 'var(--coral)' : 'var(--gold)';
  customPreview.textContent = isNaN(n) ? '' : tierLabel(n);
}
document.querySelectorAll('#sign-toggle .sign').forEach(b => b.addEventListener('click', () => {
  customSign = +b.dataset.sign;
  document.querySelectorAll('#sign-toggle .sign').forEach(x => x.classList.toggle('sel', x === b));
  refreshCustomPreview();
}));

function tierLabel(n) {
  if (!n) return '';
  const neg = n < 0, mag = Math.abs(n);
  if (mag >= 50) return neg ? 'ceremony tier: unforgivable' : 'ceremony tier: legendary';
  if (mag >= 25) return neg ? 'ceremony tier: serious offense' : 'ceremony tier: big deal';
  if (mag <= 5)  return 'ceremony tier: petty';
  return 'ceremony tier: standard';
}

$('#chip-custom').addEventListener('click', () => {
  if (!me) return askIdentity();
  customAmt.value = ''; customPreview.textContent = '';
  customSign = 1;
  document.querySelectorAll('#sign-toggle .sign').forEach(x => x.classList.toggle('sel', x.dataset.sign === '1'));
  customAmt.style.color = 'var(--gold)';
  $('#custom-reason').value = '';
  $('#custom-title').textContent = `Name your price · ${PLAYERS[other(me)]}`;
  $('#veil-custom').classList.add('open');
  setTimeout(() => customAmt.focus(), 80);
});
customAmt.addEventListener('input', () => {
  customAmt.value = customAmt.value.replace(/[^0-9]/g, '');
  refreshCustomPreview();
});
$('#custom-cancel').addEventListener('click', () => $('#veil-custom').classList.remove('open'));
$('#custom-confirm').addEventListener('click', async () => {
  const n = signedValue();
  if (!n) { customAmt.placeholder = '?'; customAmt.value = ''; return; }
  const reason = $('#custom-reason').value.trim();
  if (!reason) { $('#custom-reason').placeholder = 'A reason is required. Them\'s the rules.'; return; }
  const amount = Math.max(-999, Math.min(999, n));
  $('#veil-custom').classList.remove('open');
  try {
    await addEntry({ to: other(me), by: me, amount, reason });
    ceremony(amount);
  } catch (err) { alert(err.message || 'That didn\'t go through. Try again.'); }
});

/* ═════════ GLITTER ENGINE ═════════ */
const canvas = $('#glitter'), ctx = canvas.getContext('2d');
let W, H, sparks = [], ambientDots = [];
const DPR = Math.min(devicePixelRatio || 1, 2);
function resize() {
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize(); addEventListener('resize', resize);

const GOLD   = ['#ffd98e', '#fff3d6', '#ffbde0', '#c9ecff'];
const VIOLET = ['#c5a3ff', '#e8dbff', '#ffd98e', '#ffffff'];
const CORAL  = ['#ff8e8e', '#ffc4c4', '#ffb08e', '#f4efff'];
for (let i = 0; i < 40; i++) ambientDots.push({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: Math.random() * 1.6 + 0.4, tw: Math.random() * Math.PI * 2,
  sp: 0.008 + Math.random() * 0.02, c: GOLD[i % GOLD.length]
});

function burst(count, palette, speed, down) {
  const cx = W / 2, cy = H / 2;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, v = (2 + Math.random() * 7) * speed;
    sparks.push({
      x: cx, y: cy,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v + (down ? 2.5 : -3) * speed,
      r: Math.random() * 2.6 + 0.8,
      life: 1,
      decay: (0.008 + Math.random() * 0.012) / Math.max(speed * 0.8, 1),
      c: palette[Math.floor(Math.random() * palette.length)]
    });
  }
}

function tick() {
  ctx.clearRect(0, 0, W, H);
  for (const p of ambientDots) {
    p.tw += p.sp;
    ctx.globalAlpha = Math.max(0.25 + Math.sin(p.tw) * 0.25, 0);
    ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
  }
  sparks = sparks.filter(s => s.life > 0);
  for (const s of sparks) {
    s.x += s.vx; s.y += s.vy; s.vy += 0.06; s.vx *= 0.985; s.life -= s.decay;
    ctx.globalAlpha = Math.max(s.life, 0);
    ctx.fillStyle = s.c;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r * s.life, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(tick);
}
tick();

/* ═════════ CEREMONY ═════════ */
const cer = $('#ceremony'), cerNum = $('#ceremony-num'), cerTag = $('#ceremony-tag'), flash = $('#flash');

function ceremony(amount) {
  const neg = amount < 0, mag = Math.abs(amount);
  let tier, tag = '', count, palette = neg ? CORAL : GOLD, speed = 1, dur = 1600;
  if (mag >= 50) {
    tier = 't3'; tag = neg ? 'UNFORGIVABLE' : 'LEGENDARY';
    count = 450; palette = neg ? CORAL : VIOLET; speed = 1.5; dur = 2700;
    flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
  } else if (mag >= 25) {
    tier = 't2'; tag = neg ? 'SERIOUS OFFENSE' : 'BIG DEAL';
    count = 250; speed = 1.2; dur = 1700;
    document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');
  } else {
    tier = 't1'; count = mag <= 5 ? 60 : 120;
  }
  cerNum.textContent = (neg ? '−' : '+') + mag;
  cerTag.textContent = tag;
  cer.className = 'ceremony ' + tier + (neg ? ' neg' : '');
  void cer.offsetWidth; cer.classList.add('on');
  burst(count, palette, speed, neg);
  setTimeout(() => cer.classList.remove('on'), dur);
}

/* ═════════ DRAWER ═════════ */
const burger = document.getElementById('burger');
const drawerVeil = document.getElementById('drawer-veil');
function toggleDrawer() {
  const open = drawerVeil.classList.toggle('open');
  burger.classList.toggle('open', open);
  burger.setAttribute('aria-expanded', open);
}
burger.addEventListener('click', toggleDrawer);
drawerVeil.addEventListener('click', e => { if (e.target === drawerVeil) toggleDrawer(); });

/* ═════════ BOOT ═════════ */
initData();
if (!me) askIdentity();
</script>
</body>
</html>
